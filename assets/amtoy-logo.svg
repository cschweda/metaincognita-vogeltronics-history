<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 320" role="img" aria-label="AmToy. Games That Think!">
  <defs>
    <linearGradient id="cream" x1="0" y1="60" x2="0" y2="232" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fbf7ec"/>
      <stop offset=".55" stop-color="#f4efe6"/>
      <stop offset="1" stop-color="#d9d0bd"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="60" x2="0" y2="232" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff6a55"/>
      <stop offset=".5" stop-color="#f23a2b"/>
      <stop offset="1" stop-color="#c31b10"/>
    </linearGradient>
    <radialGradient id="sheen" cx=".5" cy="0" r="1.2">
      <stop offset="0" stop-color="#2a2a2a"/>
      <stop offset=".55" stop-color="#151310"/>
      <stop offset="1" stop-color="#0e0d0b"/>
    </radialGradient>
    <radialGradient id="ledball" cx=".36" cy=".3" r=".95">
      <stop offset="0" stop-color="#ffe3da"/>
      <stop offset=".28" stop-color="#ff7a62"/>
      <stop offset=".62" stop-color="#f0281a"/>
      <stop offset="1" stop-color="#8e0c05"/>
    </radialGradient>
    <radialGradient id="ledglow" cx=".5" cy=".5" r=".5">
      <stop offset="0" stop-color="#ff4436" stop-opacity=".55"/>
      <stop offset=".55" stop-color="#ff4436" stop-opacity=".18"/>
      <stop offset="1" stop-color="#ff4436" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- plaque -->
  <rect x="1.5" y="1.5" width="997" height="317" rx="30" fill="url(#sheen)" stroke="#322c22" stroke-width="3"/>

  <!-- badge rails: silver above, red below -->
  <line x1="64" y1="42" x2="936" y2="42" stroke="#c7cbd1" stroke-width="3" stroke-linecap="round" opacity=".75"/>
  <line x1="64" y1="278" x2="936" y2="278" stroke="#e0362a" stroke-width="4" stroke-linecap="round"/>

  <!-- wordmark: dark rim under-layer, then color layer -->
  <g>
    <path d="M237.0 86 L185.0 206" fill="none" stroke="#060505" stroke-width="33" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M237.0 86 L289.0 206" fill="none" stroke="#060505" stroke-width="33" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M201.6 167.6 L272.4 167.6" fill="none" stroke="#060505" stroke-width="33" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M323.0 206 L323.0 86" fill="none" stroke="#060505" stroke-width="33" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M323.0 86 L371.0 165.2 L419.0 86" fill="none" stroke="#060505" stroke-width="33" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M419.0 86 L419.0 206" fill="none" stroke="#060505" stroke-width="33" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M453.0 86 L535.0 86" fill="none" stroke="#060505" stroke-width="33" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M494.0 86 L494.0 206" fill="none" stroke="#060505" stroke-width="33" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M727.0 86 L771.0 148.4" fill="none" stroke="#060505" stroke-width="33" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M815.0 86 L771.0 148.4" fill="none" stroke="#060505" stroke-width="33" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M771.0 148.4 L771.0 206" fill="none" stroke="#060505" stroke-width="33" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="631.0" cy="146.0" r="60.0" fill="none" stroke="#060505" stroke-width="33"/>
  </g>
  <g>
    <path d="M237.0 86 L185.0 206" fill="none" stroke="url(#cream)" stroke-width="26" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M237.0 86 L289.0 206" fill="none" stroke="url(#cream)" stroke-width="26" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M201.6 167.6 L272.4 167.6" fill="none" stroke="url(#cream)" stroke-width="26" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M323.0 206 L323.0 86" fill="none" stroke="url(#cream)" stroke-width="26" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M323.0 86 L371.0 165.2 L419.0 86" fill="none" stroke="url(#cream)" stroke-width="26" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M419.0 86 L419.0 206" fill="none" stroke="url(#cream)" stroke-width="26" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M453.0 86 L535.0 86" fill="none" stroke="url(#red)" stroke-width="26" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M494.0 86 L494.0 206" fill="none" stroke="url(#red)" stroke-width="26" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M727.0 86 L771.0 148.4" fill="none" stroke="url(#red)" stroke-width="26" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M815.0 86 L771.0 148.4" fill="none" stroke="url(#red)" stroke-width="26" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M771.0 148.4 L771.0 206" fill="none" stroke="url(#red)" stroke-width="26" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="631.0" cy="146.0" r="60.0" fill="none" stroke="url(#red)" stroke-width="26"/>
  </g>

  <!-- LED apex: glow, ball, specular -->
  <circle cx="237.0" cy="76" r="48" fill="url(#ledglow)"/>
  <circle cx="237.0" cy="76" r="23" fill="url(#ledball)" stroke="#060505" stroke-width="3"/>
  <ellipse cx="230.0" cy="67" rx="7" ry="5" fill="#ffffff" opacity=".85" transform="rotate(-24 230.0 67)"/>

  <!-- tagline -->
  <text x="500.0" y="260" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" letter-spacing="7" fill="#e6b23e">GAMES THAT THINK!</text>
</svg>
